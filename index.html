<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>Test Tema 3 — Estatut d'Autonomia de la Comunitat Valenciana | Opositar en Valencia</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --naranja: #d97706;
    --naranja-claro: #fef3c7;
    --naranja-borde: #f59e0b;
    --azul-oscuro: #1e293b;
    --texto: #374151;
    --texto-suave: #6b7280;
    --borde: #e5e7eb;
    --fondo: #fafaf9;
    --blanco: #ffffff;
    --verde: #166534;
    --verde-bg: #f0fdf4;
    --verde-borde: #86efac;
    --rojo: #991b1b;
    --rojo-bg: #fef2f2;
    --rojo-borde: #fca5a5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--fondo);
    color: var(--texto);
    min-height: 100vh;
    font-size: 16px;
    line-height: 1.6;
  }
  header { background: var(--blanco); border-bottom: 1px solid var(--borde); padding: 0; }
  .header-top { max-width: 860px; margin: 0 auto; padding: 1.4rem 1.5rem 1rem; display: flex; align-items: flex-start; gap: 1.2rem; }
  .header-logo { width: 48px; height: 48px; border-radius: 8px; object-fit: contain; flex-shrink: 0; }
  .header-textos { flex: 1; }
  .header-site { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--naranja); font-weight: 600; margin-bottom: 3px; }
  .header-titulo { font-family: 'Lora', serif; font-size: clamp(1.25rem, 3.5vw, 1.75rem); font-weight: 700; color: var(--azul-oscuro); line-height: 1.2; }
  .header-sub { font-size: 0.88rem; color: var(--texto-suave); margin-top: 4px; }
  .header-meta { background: var(--naranja-claro); border-top: 1px solid #fde68a; padding: 0.55rem 1.5rem; }
  .header-meta-inner { max-width: 860px; margin: 0 auto; display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; font-size: 0.83rem; color: #92400e; font-weight: 500; }
  .barra-wrap { position: sticky; top: 0; z-index: 100; background: var(--blanco); border-bottom: 1px solid var(--borde); padding: 0.6rem 1.5rem; box-shadow: 0 1px 6px rgba(0,0,0,0.05); }
  .barra-inner { max-width: 860px; margin: 0 auto; display: flex; align-items: center; gap: 1rem; }
  .barra-track { flex: 1; height: 6px; background: #f3f4f6; border-radius: 99px; overflow: hidden; }
  .barra-fill { height: 100%; background: var(--naranja); border-radius: 99px; transition: width 0.35s ease; width: 0%; }
  .barra-num { font-size: 13px; font-weight: 600; color: var(--azul-oscuro); white-space: nowrap; min-width: 52px; }
  .barra-score { font-size: 13px; color: var(--texto-suave); white-space: nowrap; }
  .barra-score .ok { color: var(--verde); font-weight: 600; }
  .barra-score .ko { color: var(--rojo); font-weight: 600; }
  main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 5rem; }
  .card { background: var(--blanco); border: 1px solid var(--borde); border-radius: 10px; padding: 1.5rem 1.6rem; margin-bottom: 1.4rem; transition: box-shadow 0.2s; }
  .card:hover { box-shadow: 0 3px 14px rgba(0,0,0,0.06); }
  .card-num { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--naranja); margin-bottom: 0.5rem; }
  .card-pregunta { font-family: 'Lora', serif; font-size: 1rem; font-weight: 600; line-height: 1.55; color: var(--azul-oscuro); margin-bottom: 1.1rem; }
  .opciones { display: flex; flex-direction: column; gap: 0.45rem; }
  .opcion { display: flex; align-items: flex-start; gap: 0.7rem; padding: 0.7rem 1rem; border: 1.5px solid var(--borde); border-radius: 7px; cursor: pointer; background: var(--blanco); text-align: left; font-family: 'Source Sans 3', sans-serif; font-size: 0.93rem; color: var(--texto); line-height: 1.5; transition: border-color 0.15s, background 0.15s; width: 100%; }
  .opcion:hover:not(:disabled) { border-color: var(--naranja-borde); background: var(--naranja-claro); }
  .opcion .letra { font-weight: 700; color: var(--naranja); min-width: 18px; font-size: 0.85rem; margin-top: 2px; flex-shrink: 0; }
  .opcion.correcta { border-color: var(--verde-borde); background: var(--verde-bg); color: var(--verde); }
  .opcion.correcta .letra { color: #15803d; }
  .opcion.incorrecta { border-color: var(--rojo-borde); background: var(--rojo-bg); color: var(--rojo); }
  .opcion.incorrecta .letra { color: var(--rojo); }
  .opcion:disabled { cursor: default; }
  .explicacion { display: none; margin-top: 1rem; padding: 0.9rem 1rem 0.9rem 1.1rem; background: #fffbeb; border-left: 3px solid var(--naranja); border-radius: 0 6px 6px 0; font-size: 0.875rem; line-height: 1.65; color: var(--texto); }
  .explicacion.visible { display: block; animation: fadeIn 0.22s ease; }
  .explicacion strong { color: var(--azul-oscuro); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
  .resultado { display: none; background: var(--blanco); border: 1px solid var(--borde); border-radius: 12px; padding: 2.5rem 2rem 2rem; margin: 1.5rem 0 2rem; text-align: center; }
  .resultado.visible { display: block; animation: fadeIn 0.3s ease; }
  .resultado-eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--naranja); font-weight: 600; margin-bottom: 0.5rem; }
  .resultado h2 { font-family: 'Lora', serif; font-size: 1.75rem; font-weight: 700; color: var(--azul-oscuro); margin-bottom: 0.3rem; }
  .resultado-nota { font-size: 3.2rem; font-weight: 700; color: var(--azul-oscuro); line-height: 1; margin: 1rem 0 0.3rem; font-family: 'Lora', serif; }
  .resultado-nota span { color: var(--naranja); }
  .calif-badge { display: inline-block; padding: 5px 16px; border-radius: 99px; font-size: 0.9rem; font-weight: 600; margin: 0.6rem 0 1.5rem; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin: 0 0 1.5rem; }
  .stat { background: var(--fondo); border: 1px solid var(--borde); border-radius: 8px; padding: 0.9rem 0.5rem; }
  .stat-num { font-size: 1.9rem; font-weight: 700; font-family: 'Lora', serif; }
  .stat-lab { font-size: 0.78rem; color: var(--texto-suave); margin-top: 2px; }
  .resultado-hint { font-size: 0.85rem; color: var(--texto-suave); margin-bottom: 1.2rem; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 0.7rem 1.6rem; border-radius: 7px; font-family: 'Source Sans 3', sans-serif; font-size: 0.95rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.18s; text-decoration: none; }
  .btn-naranja { background: var(--naranja); color: white; }
  .btn-naranja:hover { background: #b45309; transform: translateY(-1px); }
  .divider { text-align: center; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--texto-suave); margin: 2rem 0 1.5rem; display: flex; align-items: center; gap: 1rem; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--borde); }
  @media (max-width: 580px) {
    main { padding: 1.2rem 1rem 4rem; }
    .card { padding: 1.1rem 1.1rem; }
    .stats { grid-template-columns: 1fr 1fr; }
    .header-top { padding: 1rem; gap: 0.8rem; }
    .header-meta { padding: 0.5rem 1rem; }
  }
</style>
</head>

<header>

    <img class="header-logo"
      src="https://opositorgva.wordpress.com/wp-content/uploads/2024/04/cropped-opositar-en-valencia-logo-sin-fondo.png"

    <div class="header-textos">

<main id="mainContent"></main>

<script>
const BANCO = [
  {
    p: "Según el artículo 1.1 del Estatuto de Autonomía, ¿con qué denominación oficial se constituye la Comunidad Autónoma?",
    ops: ["Reino de Valencia", "País Valenciano", "Comunitat Valenciana", "Región de Valencia"],
    c: 2,
    exp: "<strong>Respuesta correcta: C.</strong> El art. 1.1 del Estatuto de Autonomía establece que el pueblo valenciano se constituye en Comunidad Autónoma con la denominación de <em>Comunitat Valenciana</em>. Esta denominación en valenciano es la oficial, y el precepto la define como expresión de su identidad diferenciada como nacionalidad histórica."
  },
  {
    p: "¿Cómo define el artículo 1.1 del Estatuto a la Comunitat Valenciana en términos de identidad política?",
    ops: ["Como región autónoma integrada en el Estado federal español", "Como expresión de su identidad diferenciada como nacionalidad histórica", "Como comunidad plurinacional con derecho a la autodeterminación", "Como entidad territorial de segundo nivel dentro del Estado unitario"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 1.1 del Estatuto la define como expresión de su identidad diferenciada como nacionalidad histórica, ejerciendo el derecho de autogobierno que la Constitución Española reconoce. El término 'nacionalidad histórica' es relevante y distingue a la Comunitat Valenciana de simples regiones administrativas."
  },
  {
    p: "¿Cuál es la norma institucional básica de la Comunitat Valenciana, según el artículo 1.2 del Estatuto?",
    ops: ["La Constitución Española de 1978", "El propio Estatuto de Autonomía", "El Reglamento de Les Corts Valencianes", "La Ley del Consell"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 1.2 del Estatuto establece que la Comunitat Valenciana se rige por el propio Estatuto, que es su norma institucional básica. La Constitución es la norma suprema del Estado, pero el Estatuto es la norma básica específica de la Comunitat, equivalente a su 'constitución' autonómica."
  },
  {
    p: "¿Qué territorio comprende la Comunitat Valenciana según el artículo 2 del Estatuto?",
    ops: ["El territorio de las comarcas históricas del antiguo Reino de Valencia", "El de los municipios integrados en las provincias de Alicante, Castellón y Valencia", "El territorio delimitado por los límites geográficos del Mar Mediterráneo y los montes Ibéricos", "El de los municipios que voluntariamente se hayan adherido al Estatuto"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 2 del Estatuto define el territorio de la Comunitat Valenciana como el de los municipios integrados en las provincias de Alicante, Castellón y Valencia. La delimitación es de base provincial, lo que coincide con la organización territorial del Estado prevista en la Constitución."
  },
  {
    p: "Conforme al artículo 3.1 del Estatuto, ¿quiénes gozan de la condición política de valencianos?",
    ops: ["Todos los nacidos en el territorio de la Comunitat Valenciana", "Todos los ciudadanos españoles que tengan o adquieran vecindad administrativa en cualquier municipio de la Comunitat Valenciana", "Solo los ciudadanos españoles con más de dos años de residencia efectiva en la Comunitat", "Los ciudadanos españoles y europeos empadronados en la Comunitat Valenciana"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 3.1 del Estatuto establece que gozan de la condición política de valencianos todos los ciudadanos españoles que tengan o adquieran vecindad administrativa en cualquier municipio de la Comunitat. El criterio es la vecindad administrativa, no el nacimiento ni la residencia continuada."
  },
  {
    p: "¿Cómo describe el artículo 4.1 del Estatuto la Bandera de la Comunitat Valenciana?",
    ops: ["Cuatro barras rojas sobre fondo amarillo, coronadas sobre franja azul junto al asta", "Tres franjas horizontales azul, blanca y roja con el escudo de la Comunitat", "Cuatro barras amarillas sobre fondo rojo, con franja verde junto al asta", "Las barras de la Corona de Aragón sin ningún añadido"],
    c: 0,
    exp: "<strong>Respuesta correcta: A.</strong> El art. 4.1 del Estatuto describe la Senyera como la bandera tradicional compuesta por cuatro barras rojas sobre fondo amarillo, coronadas sobre franja azul junto al asta. Esta franja azul es el elemento diferenciador respecto a otras banderas de la Corona de Aragón y hace referencia a la conquista del Reino de Valencia."
  },
  {
    p: "Según el artículo 5.1 del Estatuto, ¿en qué ciudad y edificio tiene su sede la Generalitat?",
    ops: ["En el Palau de la Generalitat, en la ciudad de Valencia", "En el Palacio de los Borja, en la ciudad de Valencia", "En el Palacio del Temple, en la ciudad de Valencia", "En el Palacio de la Diputación Provincial, en la ciudad de Valencia"],
    c: 0,
    exp: "<strong>Respuesta correcta: A.</strong> El art. 5.1 del Estatuto establece que la sede de la Generalitat será el palacio de este nombre —el Palau de la Generalitat— en la ciudad de Valencia. No debe confundirse con la sede de Les Corts, que según el art. 21.2 se sitúa en el Palacio de los Borja."
  },
  {
    p: "De acuerdo con el artículo 6.1 del Estatuto, ¿cuál es la lengua propia de la Comunitat Valenciana?",
    ops: ["El castellano", "El catalán", "El valenciano", "El valenciano y el castellano en régimen de cooficialidad plena e igualitaria"],
    c: 2,
    exp: "<strong>Respuesta correcta: C.</strong> El art. 6.1 del Estatuto establece que la lengua propia de la Comunitat Valenciana es el valenciano. Tanto el valenciano como el castellano son lenguas oficiales (art. 6.2), pero el valenciano es la lengua propia por razón histórica y territorial. La distinción entre 'lengua propia' y 'lengua oficial' es relevante para el examen."
  },
  {
    p: "Conforme al artículo 6.2 del Estatuto, ¿cuáles son las lenguas oficiales en la Comunitat Valenciana?",
    ops: ["Solo el valenciano, por ser la lengua propia", "Solo el castellano, como idioma oficial del Estado", "El valenciano y el castellano, siendo el castellano el idioma oficial del Estado", "El valenciano, el castellano y el aranés en las zonas de predominio lingüístico"],
    c: 2,
    exp: "<strong>Respuesta correcta: C.</strong> El art. 6.2 del Estatuto establece que tanto el valenciano como el castellano son idiomas oficiales en la Comunitat Valenciana, matizando que el castellano es el idioma oficial del Estado. Todos tienen derecho a conocerlos, usarlos y a recibir enseñanza del y en idioma valenciano."
  },
  {
    p: "¿Qué institución es la encargada de la normativa lingüística del idioma valenciano, según el artículo 6.8 del Estatuto?",
    ops: ["La Conselleria d'Educació de la Generalitat", "El Consell Valenciá de Cultura", "L'Acadèmia Valenciana de la Llengua", "La Universitat de València"],
    c: 2,
    exp: "<strong>Respuesta correcta: C.</strong> El art. 6.8 del Estatuto establece que L'Acadèmia Valenciana de la Llengua es la institución normativa del idioma valenciano. Según el art. 41, su normativa lingüística es de aplicación obligatoria en todas las administraciones públicas de la Comunitat Valenciana."
  },
  {
    p: "Según el artículo 7.2 del Estatuto, ¿qué eficacia tienen las normas y disposiciones de la Generalitat?",
    ops: ["Eficacia universal, independientemente del lugar donde se encuentre el destinatario", "Eficacia territorial, salvo en los casos en que sea aplicable el estatuto personal u otras normas de extraterritorialidad", "Eficacia limitada al ámbito municipal en el que se dicten", "Eficacia subordinada a las normas estatales, incluso en materias de competencia exclusiva"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 7.2 del Estatuto establece el principio de territorialidad: las normas de la Generalitat y el Derecho Foral Valenciano tienen eficacia territorial con las excepciones del estatuto personal y otras normas de extraterritorialidad. Esto implica que, en principio, se aplican solo dentro del territorio de la Comunitat."
  },
  {
    p: "¿Qué derecho reconoce el artículo 9.2 del Estatuto a los ciudadanos valencianos en sus relaciones con la Administración autonómica?",
    ops: ["El derecho a obtener respuesta motivada en cualquier idioma de la Unión Europea", "El derecho a dirigirse a la Administración de la Comunitat en cualquiera de sus dos lenguas oficiales y a recibir respuesta en la misma lengua utilizada", "El derecho a que todos los documentos administrativos se redacten en valenciano", "El derecho a la asistencia lingüística gratuita en todos los procedimientos"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 9.2 del Estatuto reconoce el derecho de los ciudadanos valencianos a dirigirse a la Administración de la Comunitat en cualquiera de las dos lenguas oficiales —valenciano o castellano— y a recibir respuesta en la misma lengua utilizada. Este derecho es una concreción del principio de cooficialidad lingüística."
  },
  {
    p: "¿Qué garantiza el artículo 15 del Estatuto en relación con la pobreza y la exclusión social?",
    ops: ["Una prestación económica de inserción de cuantía fija para todos los desempleados", "El derecho de los ciudadanos valencianos en estado de necesidad a la solidaridad y a una renta de ciudadanía en los términos previstos en la Ley", "La gratuidad de todos los servicios sociales básicos para la población en riesgo de exclusión", "La obligación del Consell de garantizar el pleno empleo en el territorio valenciano"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 15 del Estatuto garantiza el derecho de los ciudadanos valencianos en estado de necesidad a la solidaridad y a una renta de ciudadanía, cuyas condiciones concretas remite a la ley. Es una manifestación del Estado social y de la acción protectora de la Generalitat frente a la pobreza y la exclusión."
  },
  {
    p: "¿Qué garantiza el artículo 16 del Estatuto en materia de vivienda?",
    ops: ["La propiedad de una vivienda a todos los ciudadanos valencianos sin recursos", "El derecho de acceso a una vivienda digna de los ciudadanos valencianos, con ayudas reguladas por ley especialmente para colectivos vulnerables", "La gratuidad del alquiler para jóvenes menores de 30 años", "La preferencia en la adjudicación de viviendas de protección oficial a los residentes de más de diez años"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 16 del Estatuto garantiza el derecho de acceso a una vivienda digna de los ciudadanos valencianos, encomendando a la ley la regulación de las ayudas para promoverlo, especialmente en favor de jóvenes, personas sin medios, mujeres maltratadas, personas con discapacidad y otros colectivos vulnerables."
  },
  {
    p: "Según el artículo 17.2 del Estatuto, ¿qué derecho medioambiental reconoce a toda persona?",
    ops: ["El derecho a recibir indemnización por daños medioambientales causados por la Administración", "El derecho a gozar de una vida y un medio ambiente seguro, sano y ecológicamente equilibrado", "El derecho a participar en los procedimientos de evaluación de impacto ambiental", "El derecho a exigir la restauración de espacios naturales degradados"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 17.2 del Estatuto reconoce que toda persona tiene derecho a gozar de una vida y un medio ambiente seguro, sano y ecológicamente equilibrado. La Generalitat, en virtud de este precepto, queda obligada a proteger el medio ambiente, la diversidad biológica, los procesos ecológicos y otras áreas de especial importancia ecológica."
  },
  {
    p: "¿Qué instituciones forman parte de la Generalitat según el artículo 20.2 del Estatuto?",
    ops: ["Les Corts Valencianes, el President y el Consell", "Les Corts Valencianes, el President, el Consell y el Tribunal Superior de Justicia", "Les Corts Valencianes, el Consell y la Sindicatura de Comptes", "Les Corts Valencianes, el President, el Consell y el Síndic de Greuges"],
    c: 0,
    exp: "<strong>Respuesta correcta: A.</strong> El art. 20.2 del Estatuto enumera como instituciones que forman parte de la Generalitat: Les Corts Valencianes o Les Corts, el President y el Consell. Las demás instituciones (Sindicatura de Comptes, Síndic de Greuges, Consell Valenciá de Cultura, AVL, Consell Jurídic Consultiu y Comité Econòmic i Social) son también instituciones de la Generalitat pero se mencionan en el art. 20.3 de forma separada."
  },
  {
    p: "¿Cuáles son también instituciones de la Generalitat, según el artículo 20.3 del Estatuto?",
    ops: ["La Sindicatura de Comptes, el Síndic de Greuges, el Consell Valenciá de Cultura, l'Acadèmia Valenciana de la Llengua, el Consell Jurídic Consultiu y el Comité Econòmic i Social", "El Tribunal Superior de Justicia, la Fiscalía y el Consejo General del Poder Judicial en la Comunitat", "La Diputació Provincial, los ayuntamientos y las mancomunidades de municipios", "El Consell Jurídic Consultiu, el Defensor del Pueblo y el Tribunal de Cuentas"],
    c: 0,
    exp: "<strong>Respuesta correcta: A.</strong> El art. 20.3 del Estatuto enumera seis instituciones adicionales: Sindicatura de Comptes, Síndic de Greuges, Consell Valenciá de Cultura, L'Acadèmia Valenciana de la Llengua, Consell Jurídic Consultiu y Comité Econòmic i Social. Estas seis instituciones son fáciles de confundir en examen y conviene memorizarlas en conjunto."
  },
  {
    p: "Según el artículo 21.1 del Estatuto, ¿a quién corresponde la potestad legislativa dentro de la Comunitat Valenciana?",
    ops: ["Al Consell de la Generalitat", "Al President de la Generalitat", "A Les Corts, que representan al pueblo", "Al Gobierno del Estado en materias de competencia compartida"],
    c: 2,
    exp: "<strong>Respuesta correcta: C.</strong> El art. 21.1 del Estatuto atribuye la potestad legislativa de la Comunitat Valenciana a Les Corts, que representan al pueblo. El Estatuto añade que Les Corts son inviolables y gozan de autonomía, características que también tienen las Cortes Generales en el ámbito estatal."
  },
  {
    p: "¿Dónde tienen su sede Les Corts Valencianes, según el artículo 21.2 del Estatuto?",
    ops: ["En el Palau de la Generalitat, en Valencia", "En el Palacio de los Borja, en la ciudad de Valencia", "En el Palacio del Temple, en Valencia", "En el edificio de La Nau de la Universitat de València"],
    c: 1,

// ── ALEATORIZACIÓN ──
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function prepararPreguntas() {
  const mezcladas = shuffle(BANCO);
  return mezcladas.map(q => {
    const respuestaTextoCorrecta = q.ops[q.c];
    const opsNuevas = shuffle(q.ops);
    const nuevoC = opsNuevas.indexOf(respuestaTextoCorrecta);
    return { p: q.p, ops: opsNuevas, c: nuevoC, exp: q.exp };
  });
}

let preguntas = [];
let respondidas = 0, correctas = 0, incorrectas = 0;

function actualizarBarra() {
  const pct = preguntas.length ? (respondidas / preguntas.length) * 100 : 0;
  document.getElementById('barraFill').style.width = pct + '%';
  document.getElementById('barraNum').textContent = respondidas + ' / ' + preguntas.length;
  document.getElementById('scoreOk').textContent = '✓ ' + correctas;
  document.getElementById('scoreKo').textContent = '✗ ' + incorrectas;
}

function responder(qi, oi) {
  const q = preguntas[qi];
  const btns = document.querySelectorAll('[data-qi="' + qi + '"]');
  btns.forEach(b => b.disabled = true);
  btns.forEach((b, j) => {
    if (j === q.c) b.classList.add('correcta');
    else if (j === oi && oi !== q.c) b.classList.add('incorrecta');
  });
  document.getElementById('exp-' + qi).classList.add('visible');
  respondidas++;
  if (oi === q.c) correctas++; else incorrectas++;
  actualizarBarra();
  if (respondidas === preguntas.length) setTimeout(mostrarResultado, 700);
}

function mostrarResultado() {
  const pct = Math.round((correctas / preguntas.length) * 100);
  document.getElementById('resPunt').innerHTML = correctas + ' <span>/ ' + preguntas.length + '</span>';
  document.getElementById('resCorr').textContent = correctas;
  document.getElementById('resIncorr').textContent = incorrectas;
  document.getElementById('resPct').textContent = pct + '%';

  let txt, col, bg;
  if (pct >= 90)      { txt = '🏆 Sobresaliente'; col = '#166534'; bg = '#f0fdf4'; }
  else if (pct >= 75) { txt = '✅ Notable';        col = '#1e3a5f'; bg = '#eff6ff'; }
  else if (pct >= 60) { txt = '📘 Aprobado';       col = '#92400e'; bg = '#fffbeb'; }
  else                { txt = '❌ Insuficiente — ¡Sigue practicando!'; col = '#991b1b'; bg = '#fef2f2'; }

  document.getElementById('resCalif').innerHTML =
    '<span class="calif-badge" style="background:' + bg + ';color:' + col + '">' + txt + '</span>';

  const el = document.getElementById('resultado');
  el.classList.add('visible');
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function render() {
  respondidas = 0; correctas = 0; incorrectas = 0;
  preguntas = prepararPreguntas();
  actualizarBarra();

  const main = document.getElementById('mainContent');
  main.innerHTML = '';
  const letras = ['A','B','C','D'];

  preguntas.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'card';

    const opsHTML = q.ops.map((op, j) =>
      `<button class="opcion" data-qi="${i}" onclick="responder(${i},${j})">
        <span class="letra">${letras[j]})</span><span>${op}</span>
      </button>`
    ).join('');

    card.innerHTML =
      `<div class="card-num">Pregunta ${i + 1} de ${preguntas.length}</div>
       <div class="card-pregunta">${q.p}</div>
       <div class="opciones">${opsHTML}</div>
       <div class="explicacion" id="exp-${i}">${q.exp}</div>`;

    main.appendChild(card);
  });

  const sep = document.createElement('div');
  sep.className = 'divider';
  sep.textContent = 'Fin del test';
  main.appendChild(sep);

  const res = document.createElement('div');
  res.className = 'resultado';
  res.id = 'resultado';
  res.innerHTML =
    `<div class="resultado-eyebrow">Resultado final</div>
     <h2>Test completado</h2>
     <div class="resultado-nota" id="resPunt">0 <span>/ 50</span></div>
     <div id="resCalif"></div>
     <div class="stats">
       <div class="stat"><div class="stat-num" id="resCorr" style="color:#166534">0</div><div class="stat-lab">Correctas</div></div>
       <div class="stat"><div class="stat-num" id="resIncorr" style="color:#991b1b">0</div><div class="stat-lab">Incorrectas</div></div>
       <div class="stat"><div class="stat-num" id="resPct">0%</div><div class="stat-lab">% aciertos</div></div>
     </div>
     <p class="resultado-hint">Desplázate hacia arriba para revisar las explicaciones de cada pregunta.</p>
     <button class="btn btn-naranja" onclick="render(); window.scrollTo({top:0,behavior:'smooth'})">↺ Repetir con nuevo orden</button>`;
  main.appendChild(res);
}

render();
</script>
